<!doctype html>
<html lang="bg">
<head>
  <meta charset="utf-8">
  <title>Кулинарният блог на Иво</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="icon" type="image/svg+xml" href="/icon.svg">
  <link rel="apple-touch-icon" href="/icon.svg">
  <meta name="description" content="Традиционни български рецепти, споделени с любов. Открий лесни и вкусни ястия за всеки повод в кулинарния блог на Иво.">
  <meta name="theme-color" content="#1b3c72">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Блогът на Иво">
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="dns-prefetch" href="https://fonts.googleapis.com">
  <link rel="dns-prefetch" href="https://fonts.gstatic.com">

  <!-- App shell: shown immediately while Angular bootstraps (prevents blank screen) -->
  <style>
    .__ash{display:flex;flex-direction:column;min-height:100vh;background:#f3f7fc}
    .__ash-hdr{position:sticky;top:0;z-index:50;background:#f3f7fc;box-shadow:inset 3px 0 0 0 #bc3f34}
    .__ash-mast{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:1.5rem;max-width:1180px;margin:0 auto;padding:1.4rem 2rem 0.6rem}
    .__ash-stamp{font-family:'Special Elite','Courier New',monospace;font-size:.68rem;letter-spacing:.18em;color:#526080;text-transform:uppercase;line-height:1.6}
    .__ash-wm{text-align:center}
    .__ash-by{display:inline-block;font-family:'Caveat',cursive;font-size:1.05rem;color:#bc3f34;transform:rotate(-2deg)}
    .__ash-nm{display:block;font-family:'Geologica','Segoe UI',system-ui,sans-serif;font-style:italic;font-weight:700;font-size:clamp(2.6rem,5vw,3.5rem);letter-spacing:-.01em;line-height:.95;color:#181e30}
    .__ash-wr{display:flex;align-items:center;justify-content:center;gap:.625rem;margin-top:.375rem;font-family:'Special Elite',monospace;font-size:.72rem;letter-spacing:.3em;color:#526080;text-transform:uppercase}
    .__ash-rl{display:inline-block;height:1px;width:2.25rem;background:#96b4d4}
    .__ash-nav{border-top:1px solid #96b4d4;border-bottom:2px double #96b4d4;display:flex;align-items:center;justify-content:center;background:rgba(255,245,215,.35)}
    .__ash-nav ul{max-width:1180px;margin:0 auto;padding:.625rem 2rem;list-style:none;display:flex;gap:1.75rem;justify-content:center}
    .__ash-nav a{font-family:'Special Elite',monospace;font-size:.75rem;letter-spacing:.22em;text-transform:uppercase;color:#2e3a56;text-decoration:none}
    .__ash-body{flex:1;min-height:420px;background:linear-gradient(160deg,#ddeaf6 0%,#b8d0e8 55%,#f3f7fc 100%)}
    html.dark .__ash{background:#1a1510}
    html.dark .__ash-hdr{background:#1a1510;box-shadow:inset 3px 0 0 0 #d06858}
    html.dark .__ash-nm{color:#f2e8d0}
    html.dark .__ash-stamp,html.dark .__ash-wr{color:#8a7a62}
    html.dark .__ash-nav{border-color:#524840;background:rgba(80,64,44,.35)}
    html.dark .__ash-nav a{color:#c8bc9a}
    html.dark .__ash-rl{background:#524840}
    html.dark .__ash-body{background:linear-gradient(160deg,#231d17 0%,#1a1510 100%)}
    @media(max-width:899px){
      .__ash-mast{grid-template-columns:1fr;justify-items:center;padding:.75rem 3.5rem .625rem;gap:.1rem}
      .__ash-stamp,.__ash-right{display:none}
      .__ash-nav{display:none}
      .__ash-by{font-size:.7rem}
      .__ash-nm{font-size:1.85rem}
    }
    @media(max-width:480px){.__ash-nm{font-size:1.65rem}}
  </style>
  <!-- Read saved theme from localStorage to prevent light flash for dark-mode users -->
  <script>
    (function(){var t=localStorage.getItem('theme');if(t==='dark'||(t!=='light'&&window.matchMedia('(prefers-color-scheme:dark)').matches))document.documentElement.classList.add('dark')})()
  </script>

  <meta property="og:site_name" content="Кулинарният блог на Иво">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Кулинарният блог на Иво">
  <meta property="og:description" content="Традиционни български рецепти, споделени с любов. Открий лесни и вкусни ястия за всеки повод.">
  <meta property="og:image" content="https://cookingblogofivo.eu/og-image.jpg">
  <meta property="og:url" content="https://cookingblogofivo.eu">
  <meta property="og:locale" content="bg_BG">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Кулинарният блог на Иво">
  <meta name="twitter:description" content="Традиционни български рецепти, споделени с любов. Открий лесни и вкусни ястия за всеки повод.">
  <meta name="twitter:image" content="https://cookingblogofivo.eu/og-image.jpg">

  <meta name="robots" content="index, follow">

  <!-- Fonts: preconnect warms the connection; async load via media=print trick removes
       the render-blocking request so FCP is not held waiting for Google Fonts.
       Playfair Display and Lora were removed — they were loaded but never referenced. -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Geologica:wght@300;400;500;600;700;800&family=Caveat:wght@400;500;600;700&family=Special+Elite&display=fallback">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geologica:wght@300;400;500;600;700;800&family=Caveat:wght@400;500;600;700&family=Special+Elite&display=fallback" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geologica:wght@300;400;500;600;700;800&family=Caveat:wght@400;500;600;700&family=Special+Elite&display=swap"></noscript>

</head>
<body>
  <app-root>
  <div class="__ash" aria-hidden="true">
    <header class="__ash-hdr">
      <div class="__ash-mast">
        <div class="__ash-stamp"><div>том III · стр. 247</div><div>всекидневна кухня</div></div>
        <div class="__ash-wm">
          <span class="__ash-by">Кулинарният блог на</span>
          <span class="__ash-nm">Иво</span>
          <span class="__ash-wr"><span class="__ash-rl"></span>всекидневна кухня<span class="__ash-rl"></span></span>
        </div>
        <div class="__ash-right"></div>
      </div>
      <nav class="__ash-nav" aria-label="Навигация">
        <ul>
          <li><a href="/">Начало</a></li>
          <li><a href="/recipes">Рецепти</a></li>
          <li><a href="/categories">Категории</a></li>
        </ul>
      </nav>
    </header>
    <div class="__ash-body"></div>
  </div>
</app-root>
</body>
</html>
